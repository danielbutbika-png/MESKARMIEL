<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MES Learn">
<link rel="manifest" href="manifest.json">
<title>MES Training — Strauss</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060e1f;
  --bg2: #0d1b38;
  --bg3: #102050;
  --card: #0f2050;
  --border: rgba(96,165,250,0.18);
  --blue: #3b82f6;
  --blue2: #1d4ed8;
  --cyan: #22d3ee;
  --gold: #fbbf24;
  --green: #22c55e;
  --red: #ef4444;
  --text: #f0f6ff;
  --text2: #94a3b8;
  --text3: #64748b;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,50,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}
body.ltr { direction: ltr; font-family: 'Heebo', sans-serif; }

/* ===== SCREENS ===== */
.screen { display: none; min-height: 100vh; animation: fadeIn .25s ease; }
.screen.active { display: flex; flex-direction: column; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ===== LANGUAGE SCREEN ===== */
#screen-lang {
  background: radial-gradient(ellipse 120% 80% at 50% 0%, #1e3a8a 0%, #060e1f 65%);
  align-items: center; justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
.lang-logo { font-size: 72px; margin-bottom: 16px; animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
.lang-title { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
.lang-subtitle { font-size: 14px; color: var(--text2); margin-bottom: 48px; }
.lang-btns { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 280px; }
.lang-btn {
  padding: 18px 24px; border-radius: var(--radius); border: 2px solid var(--border);
  background: rgba(255,255,255,0.05); color: var(--text);
  font-family: 'Heebo', sans-serif; font-size: 18px; font-weight: 700;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 12px;
}
.lang-btn:hover, .lang-btn:active { background: var(--blue); border-color: var(--blue); transform: scale(1.02); }
.lang-btn .flag { font-size: 28px; }

/* ===== HEADER ===== */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  background: linear-gradient(180deg, var(--bg2) 0%, transparent 100%);
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.header-logo { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.header-logo span { color: var(--cyan); }
.header-right { display: flex; align-items: center; gap: 10px; }
.lang-toggle {
  background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px; color: var(--text2);
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
}
.lang-toggle:active { background: var(--blue); color: white; }
.progress-ring { width: 36px; height: 36px; }
.progress-ring circle { fill: none; stroke-width: 3; }
.progress-ring .track { stroke: rgba(255,255,255,0.08); }
.progress-ring .fill { stroke: var(--cyan); stroke-linecap: round; transition: stroke-dashoffset .4s ease; }

/* ===== HOME SCREEN ===== */
#screen-home { background: var(--bg); }
.home-hero {
  padding: 20px 20px 0;
  background: linear-gradient(160deg, #0d2060 0%, var(--bg) 60%);
}
.hero-welcome { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.hero-title { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
.hero-title span { color: var(--cyan); }
.progress-bar-container { margin-bottom: 20px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); border-radius: 3px; transition: width .5s ease; }

.home-grid { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.section-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; padding: 0 4px; }

/* Module Cards */
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 14px;
  position: relative; overflow: hidden;
}
.module-card::before {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
  background: var(--card-accent, var(--blue));
}
.module-card:active { transform: scale(0.98); background: #152a60; }
.module-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  background: var(--card-icon-bg, rgba(59,130,246,0.15));
}
.module-info { flex: 1; min-width: 0; }
.module-title { font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
.module-meta { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
.module-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text3); }
.module-status { flex-shrink: 0; }
.status-badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.status-badge.done { background: rgba(34,197,94,0.15); color: var(--green); }
.status-badge.prog { background: rgba(251,191,36,0.15); color: var(--gold); }
.status-badge.new { background: rgba(59,130,246,0.15); color: var(--blue); }

/* Quick Actions */
.quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.quick-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; cursor: pointer; transition: all .2s; text-align: center;
}
.quick-btn:active { transform: scale(0.97); background: var(--bg3); }
.quick-btn .q-icon { font-size: 24px; margin-bottom: 6px; }
.quick-btn .q-label { font-size: 12px; font-weight: 600; color: var(--text2); }

/* ===== LESSON SCREEN ===== */
#screen-lesson { background: var(--bg); }
.lesson-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.back-btn {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.lesson-title-header { flex: 1; }
.lesson-title-header h2 { font-size: 16px; font-weight: 700; }
.lesson-title-header p { font-size: 12px; color: var(--text2); }
.step-counter { font-size: 12px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

/* Step progress dots */
.step-dots { display: flex; gap: 6px; padding: 12px 20px; overflow-x: auto; scrollbar-width: none; }
.step-dots::-webkit-scrollbar { display: none; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,0.12); transition: all .25s;
}
.step-dot.active { background: var(--cyan); width: 24px; border-radius: 4px; }
.step-dot.done { background: var(--green); }

/* Step content */
.step-content { flex: 1; overflow-y: auto; padding: 20px; }
.step-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  animation: slideIn .3s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
.step-number { font-size: 11px; font-weight: 700; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.step-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
.step-card p { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 12px; }
.step-card ul { padding-right: 20px; }
.step-card ul li { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 6px; }

/* Video simulation card */
.video-sim {
  background: #000; border-radius: var(--radius-sm); overflow: hidden;
  margin-bottom: 16px; position: relative; aspect-ratio: 16/9;
  cursor: pointer; border: 2px solid var(--border);
}
.video-sim .vs-screen {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; position: relative;
  background: linear-gradient(135deg, #0d2060 0%, #091630 100%);
}
.video-sim .vs-play {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(59,130,246,0.9); display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: white; margin-bottom: 12px;
  box-shadow: 0 0 30px rgba(59,130,246,0.5); transition: all .2s;
}
.video-sim:active .vs-play { transform: scale(1.1); background: var(--blue); }
.video-sim .vs-title { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; padding: 0 20px; }
.video-sim .vs-duration { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.video-sim .vs-corner { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: white; font-family: 'JetBrains Mono', monospace; }

/* Simulated screen animation */
.screen-demo {
  background: #1a2744; border-radius: var(--radius-sm); overflow: hidden;
  margin-bottom: 16px; border: 1px solid var(--border);
}
.screen-demo-bar {
  background: #0f1c38; padding: 8px 12px; display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.screen-demo-bar span { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
.demo-dot { width: 8px; height: 8px; border-radius: 50%; }
.screen-demo-body { padding: 14px; }
.demo-row {
  background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px 12px;
  margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text2); border: 1px solid rgba(255,255,255,0.05);
}
.demo-row.highlight { border-color: var(--blue); background: rgba(59,130,246,0.1); color: var(--text); }
.demo-row.action { border-color: var(--green); background: rgba(34,197,94,0.08); }
.demo-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--text3); flex-shrink: 0; }
.demo-checkbox.checked { background: var(--blue); border-color: var(--blue); }

/* Info/tip/warning boxes */
.info-box {
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.info-box.tip { background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.25); }
.info-box.warn { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); }
.info-box.danger { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); }
.info-box.success { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25); }
.info-icon { font-size: 20px; flex-shrink: 0; }
.info-content { font-size: 13px; line-height: 1.6; }
.info-content strong { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 700; }
.info-box.tip .info-content { color: #a5f3fc; }
.info-box.warn .info-content { color: #fde68a; }
.info-box.danger .info-content { color: #fca5a5; }
.info-box.success .info-content { color: #bbf7d0; }

/* Step navigation */
.step-nav {
  padding: 16px 20px; display: flex; gap: 10px;
  background: var(--bg2); border-top: 1px solid var(--border);
  position: sticky; bottom: 0;
}
.nav-btn {
  flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none;
  font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all .2s;
}
.nav-btn.primary { background: var(--blue); color: white; }
.nav-btn.primary:active { background: var(--blue2); transform: scale(0.98); }
.nav-btn.secondary { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border); }
.nav-btn.secondary:active { background: rgba(255,255,255,0.12); }
.nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ===== QUIZ SCREEN ===== */
#screen-quiz { background: var(--bg); }
.quiz-header { padding: 20px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.quiz-progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
.quiz-progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--cyan)); border-radius: 2px; transition: width .4s ease; }
.quiz-q-label { font-size: 11px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.quiz-question { font-size: 17px; font-weight: 700; line-height: 1.5; }

.quiz-body { flex: 1; overflow-y: auto; padding: 20px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  background: var(--card); border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; cursor: pointer; transition: all .2s;
  display: flex; align-items: center; gap: 12px;
  font-size: 14px; font-weight: 500; line-height: 1.4;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.selected { border-color: var(--blue); background: rgba(59,130,246,0.12); }
.quiz-option.correct { border-color: var(--green); background: rgba(34,197,94,0.12); color: #bbf7d0; }
.quiz-option.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); color: #fca5a5; }
.opt-circle {
  width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--text3);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 12px; font-weight: 700; color: var(--text3);
}
.quiz-option.selected .opt-circle { border-color: var(--blue); color: var(--blue); }
.quiz-option.correct .opt-circle { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.2); }
.quiz-option.wrong .opt-circle { border-color: var(--red); color: var(--red); }

.quiz-feedback {
  margin-top: 16px; border-radius: var(--radius-sm); padding: 14px 16px;
  animation: fadeIn .25s ease; display: none;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct-fb { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
.quiz-feedback.wrong-fb { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); }
.quiz-feedback .fb-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.quiz-feedback.correct-fb .fb-title { color: var(--green); }
.quiz-feedback.wrong-fb .fb-title { color: var(--red); }
.quiz-feedback p { font-size: 13px; color: var(--text2); line-height: 1.6; }

.quiz-nav { padding: 16px 20px; background: var(--bg2); border-top: 1px solid var(--border); }

/* ===== RESULTS SCREEN ===== */
#screen-results {
  background: radial-gradient(ellipse 100% 60% at 50% 0%, #0d3070 0%, var(--bg) 60%);
  align-items: center; justify-content: center; padding: 40px 24px; text-align: center;
}
.result-icon { font-size: 72px; margin-bottom: 16px; }
.result-score { font-size: 64px; font-weight: 800; color: var(--cyan); line-height: 1; margin-bottom: 4px; }
.result-label { font-size: 16px; color: var(--text2); margin-bottom: 24px; }
.result-message { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.result-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
.result-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
.result-btn {
  padding: 16px; border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s; border: none;
}
.result-btn.primary { background: var(--blue); color: white; }
.result-btn.secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }

/* ===== GLOSSARY SCREEN ===== */
#screen-glossary { background: var(--bg); }
.glossary-search {
  padding: 14px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; align-items: center;
}
.glossary-search input {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-family: 'Heebo', sans-serif; font-size: 14px;
  outline: none; direction: inherit;
}
.glossary-search input:focus { border-color: var(--blue); }
.glossary-search input::placeholder { color: var(--text3); }
.glossary-list { padding: 12px 20px; overflow-y: auto; flex: 1; }
.glossary-item {
  border-bottom: 1px solid var(--border); padding: 14px 0;
  display: flex; flex-direction: column; gap: 4px;
}
.glossary-term { font-size: 15px; font-weight: 700; color: var(--text); }
.glossary-term-en { font-size: 12px; color: var(--blue); font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
.glossary-def { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  display: flex; background: var(--bg2); border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 6px 0; cursor: pointer; transition: all .15s;
  color: var(--text3); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.nav-item .nav-icon { font-size: 22px; }
.nav-item.active { color: var(--cyan); }
.nav-item:active { transform: scale(0.92); }

/* Spacing for bottom nav */
.has-bottom-nav { padding-bottom: 72px; }

/* ===== VIDEO PLAYER MODAL ===== */
.video-modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
  padding: 20px; flex-direction: column;
}
.video-modal.open { display: flex; }
.video-modal-close { position: absolute; top: 20px; right: 20px; font-size: 28px; cursor: pointer; color: white; z-index: 10; }
.video-player-box {
  width: 100%; max-width: 500px;
  background: #0d1b38; border-radius: var(--radius); overflow: hidden;
  border: 1px solid var(--border);
}
.video-player-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.video-player-header h3 { font-size: 15px; font-weight: 700; }
.video-animation-area {
  aspect-ratio: 16/9; background: #000;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.vid-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #0a1a40 0%, #05101e 100%); }
.vid-content { position: relative; z-index: 2; text-align: center; width: 100%; padding: 20px; }
.vid-steps { display: flex; flex-direction: column; gap: 10px; }
.vid-step {
  background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
  border-radius: 8px; padding: 10px 14px; text-align: right;
  font-size: 13px; color: var(--text); opacity: 0;
  transform: translateX(20px); transition: all .4s ease;
}
.vid-step.show { opacity: 1; transform: translateX(0); }
.vid-step .vs-icon { margin-left: 8px; }
.video-controls { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.vid-progress { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.vid-progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width .1s linear; }
.vid-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); min-width: 40px; }
.vid-play-btn {
  width: 36px; height: 36px; border-radius: 50%; background: var(--blue); border: none;
  color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
}

/* RTL/LTR helpers */
[dir="ltr"] .module-card::before { right: auto; left: 0; }
[dir="ltr"] .back-btn { transform: scaleX(-1); }

/* Scroll */
::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>

function calcProgress() {
  const done = Object.values(progress).filter(v => v === 'done').length;
  return Math.round((done / modules.length) * 100);
}

// ===================== LESSON =====================
function openModule(id) {
  currentModule = modules.find(m => m.id === id);
  currentStep = 0;
  if (progress[id] !== 'done') progress[id] = 'progress';
  showScreen('lesson');
  document.getElementById('lesson-title').textContent = lang === 'he' ? currentModule.titleHe : currentModule.titleEn;
  document.getElementById('lesson-subtitle').textContent = lang === 'he' ? currentModule.subtitleHe : currentModule.subtitleEn;
  renderStep();
}

function renderStep() {
  const steps = currentModule.steps;
  const s = steps[currentStep];
  document.getElementById('step-counter').textContent = `${currentStep + 1}/${steps.length}`;
  
  // Dots
  let dots = '';
  steps.forEach((_, i) => {
    const cls = i === currentStep ? 'active' : i < currentStep ? 'done' : '';
    dots += `<div class="step-dot ${cls}"></div>`;
  });
  document.getElementById('step-dots').innerHTML = dots;

  // Content
  const title = lang === 'he' ? s.titleHe : s.titleEn;
  const body = lang === 'he' ? s.bodyHe : s.bodyEn;
  document.getElementById('step-content').innerHTML = `
    <div class="step-card">
      <div class="step-number">${lang === 'he' ? 'שלב' : 'Step'} ${currentStep + 1}</div>
      <h3>${title}</h3>
      ${body}
    </div>`;

  // Buttons
  const isLast = currentStep === steps.length - 1;
  document.getElementById('btn-prev').textContent = t('prev');
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').textContent = isLast ? t('complete') : t('next');
  document.getElementById('btn-next').style.background = isLast ? '#7c3aed' : '';
}

function nextStep() {
  if (currentStep < currentModule.steps.length - 1) {
    currentStep++;
    renderStep();
    document.getElementById('step-content').scrollTop = 0;
  } else {
    // Complete lesson
    progress[currentModule.id] = 'done';
    startQuiz(currentModule.quiz);
    renderHome();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
    document.getElementById('step-content').scrollTop = 0;
  }
}

function goBack() {
  showScreen('home');
  renderHome();
}

// ===================== QUIZ =====================
function startQuiz(quizId) {
  currentQuiz = quizzes[quizId];
  currentQuizQ = 0;
  quizScore = 0;
  showScreen('quiz');
  renderQuestion();
}

function openQuickQuiz() {
  // Pick a random quiz
  const ids = Object.keys(quizzes);
  const rId = ids[Math.floor(Math.random() * ids.length)];
  startQuiz(rId);
  document.getElementById('nav-learn')?.classList.add('active');
  document.getElementById('nav-home')?.classList.remove('active');
}

function renderQuestion() {
  const q = currentQuiz.questions[currentQuizQ];
  const total = currentQuiz.questions.length;
  const pct = ((currentQuizQ) / total * 100) + '%';
  
  document.getElementById('quiz-prog-fill').style.width = pct;
  document.getElementById('quiz-q-label').textContent = `${t('question')} ${currentQuizQ + 1} ${t('of')} ${total}`;
  document.getElementById('quiz-question').textContent = lang === 'he' ? q.qHe : q.qEn;

  const opts = q.opts[lang];
  const letters = ['א','ב','ג','ד'];
  const lettersEn = ['A','B','C','D'];
  let html = '';
  opts.forEach((opt, i) => {
    const letter = lang === 'he' ? letters[i] : lettersEn[i];
    html += `<div class="quiz-option" onclick="selectOption(this, ${i})" data-idx="${i}">
      <div class="opt-circle">${letter}</div>
      <span>${opt}</span>
    </div>`;
  });
  document.getElementById('quiz-options').innerHTML = html;
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('quiz-feedback').style.display = 'none';
  
  const nextBtn = document.getElementById('quiz-next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = currentQuizQ === total - 1 ? t('finishQuiz') : t('nextQ');
  
  quizAnswered = false;
}

function selectOption(el, idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  
  const q = currentQuiz.questions[currentQuizQ];
  const isCorrect = idx === q.correct;
  if (isCorrect) quizScore++;

  document.querySelectorAll('.quiz-option').forEach((opt, i) => {
    if (i === q.correct) opt.classList.add('correct');
    else if (i === idx && !isCorrect) opt.classList.add('wrong');
    opt.style.cursor = 'default';
  });

  const fb = document.getElementById('quiz-feedback');
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fb.style.display = 'block';
  document.getElementById('fb-title').textContent = isCorrect ? t('correct') : t('wrong');
  document.getElementById('fb-text').textContent = lang === 'he' ? q.expHe : q.expEn;

  document.getElementById('quiz-next-btn').style.display = 'block';
}

function quizNext() {
  currentQuizQ++;
  if (currentQuizQ >= currentQuiz.questions.length) {
    showResults();
  } else {
    renderQuestion();
    document.querySelector('.quiz-body').scrollTop = 0;
  }
}

function showResults() {
  const total = currentQuiz.questions.length;
  const pct = Math.round((quizScore / total) * 100);
  const pass = pct >= 60;
  
  document.getElementById('result-icon').textContent = pass ? '🎉' : '📚';
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-label').textContent = `${quizScore}/${total} ${t('score')}`;
  document.getElementById('result-message').textContent = pass ? t('great') : '💪';
  document.getElementById('result-sub').textContent = pass ? t('pass') : t('fail');
  document.getElementById('btn-home-result').textContent = t('homeResult');
  document.getElementById('btn-retry').textContent = t('retry');
  showScreen('results');
}

function goHome() { showScreen('home'); renderHome(); }
function retryQuiz() { currentQuizQ = 0; quizScore = 0; startQuiz(Object.keys(quizzes).find(k => quizzes[k] === currentQuiz)); }

// ===================== VIDEO PLAYER =====================
function playVideo(id) {
  const v = videoData[id];
  if (!v) return;

  document.getElementById('vid-icon').textContent = v.icon;
  document.getElementById('vid-modal-title').textContent = lang === 'he' ? v.titleHe : v.titleEn;

  const ytContainer = document.getElementById('yt-container');
  const simContainer = document.getElementById('sim-container');
  const vidControls = document.getElementById('vid-controls');
  const ytIframe = document.getElementById('yt-iframe');

  if (v.youtubeId) {
    // Show real YouTube player
    ytContainer.style.display = 'block';
    simContainer.style.display = 'none';
    vidControls.style.display = 'none';
    // Use privacy-enhanced embed + autoplay
    ytIframe.src = `https://www.youtube.com/embed/${v.youtubeId}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
  } else {
    // Show animated simulation
    ytContainer.style.display = 'none';
    simContainer.style.display = 'flex';
    vidControls.style.display = 'flex';
    ytIframe.src = '';

    const steps = lang === 'he' ? v.stepsHe : v.stepsEn;
    const container = document.getElementById('vid-steps-container');
    container.innerHTML = steps.map((s, i) => `
      <div class="vid-step" id="vs-${i}">
        <span class="vs-icon">▸</span>${s}
      </div>`).join('');

    videoProgress = 0;
    videoStepIdx = 0;
    videoSteps = steps;
    document.getElementById('vid-prog').style.width = '0%';
    document.getElementById('vid-time').textContent = '0:00';
    document.getElementById('vid-play-btn').textContent = '▶';
    videoPlaying = false;
    setTimeout(() => toggleVideoPlay(v.duration), 300);
  }

  document.getElementById('video-modal').classList.add('open');
}

function toggleVideoPlay(duration) {
  if (videoPlaying) {
    clearInterval(videoTimer);
    videoPlaying = false;
    document.getElementById('vid-play-btn').textContent = '▶';
    return;
  }
  const totalDur = duration || 120;
  videoPlaying = true;
  document.getElementById('vid-play-btn').textContent = '⏸';
  const stepInterval = totalDur / videoSteps.length;
  
  videoTimer = setInterval(() => {
    videoProgress += 0.5;
    const pct = Math.min((videoProgress / totalDur) * 100, 100);
    document.getElementById('vid-prog').style.width = pct + '%';
    const mins = Math.floor(videoProgress / 60);
    const secs = Math.floor(videoProgress % 60);
    document.getElementById('vid-time').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
    
    const stepIdx = Math.min(Math.floor(videoProgress / stepInterval), videoSteps.length - 1);
    if (stepIdx !== videoStepIdx) {
      videoStepIdx = stepIdx;
      document.getElementById(`vs-${stepIdx}`)?.classList.add('show');
    }
    if (stepIdx === 0 && videoProgress < 1) {
      document.getElementById('vs-0')?.classList.add('show');
    }
    if (videoProgress >= totalDur) {
      clearInterval(videoTimer);
      videoPlaying = false;
      document.getElementById('vid-play-btn').textContent = '▶';
      videoSteps.forEach((_, i) => document.getElementById(`vs-${i}`)?.classList.add('show'));
    }
  }, 500);
}

function closeVideo() {
  clearInterval(videoTimer);
  videoPlaying = false;
  // Stop YouTube video by clearing src
  const ytIframe = document.getElementById('yt-iframe');
  ytIframe.src = '';
  document.getElementById('video-modal').classList.remove('open');
}

// ===================== SERVICE WORKER =====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init
window.addEventListener('load', () => {
  // Prevent scroll bounce
  document.body.addEventListener('touchmove', e => {
    if (e.target.closest('.step-content, .quiz-body, .glossary-list, .has-bottom-nav')) return;
    e.preventDefault();
  }, { passive: false });
});
</script>
</body>
</html>
